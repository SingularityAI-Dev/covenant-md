<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 600" width="1280" height="600" role="img" aria-label="A skill alone is a folder of prose with an implicit boundary. The caller must read every file to know what is safe to depend on. With a COVENANT.md beside it the boundary is declared, typed, and validatable. The caller depends on the contract, not the internals.">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .panel { fill: #161b22; stroke: #30363d; stroke-width: 1.5; }
      .panel-loose { fill: #161b22; stroke: #6e7681; stroke-width: 1.5; stroke-dasharray: 6 5; }
      .panel-bound { fill: #161b22; stroke: #d4a857; stroke-width: 2; }
      .title { fill: #c9d1d9; font: 600 20px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; letter-spacing: 0.04em; }
      .subtitle { fill: #8b949e; font: 400 13px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
      .col-title { fill: #c9d1d9; font: 700 16px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; letter-spacing: 0.06em; }
      .col-title-gold { fill: #d4a857; font: 700 16px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; letter-spacing: 0.06em; }
      .label { fill: #c9d1d9; font: 700 15px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
      .label-dim { fill: #6e7681; font: 700 14px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
      .label-gold { fill: #d4a857; font: 700 15px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
      .tag { fill: #8b949e; font: 600 10px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; letter-spacing: 0.14em; }
      .muted { fill: #8b949e; font: 400 12px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
      .field { fill: #d4a857; font: 600 12px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
      .red { fill: #e07050; font: 600 12px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
      .green { fill: #2db88a; font: 600 12px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
      .arrow-fuzzy-label { fill: #6e7681; font: 600 11px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; letter-spacing: 0.06em; }
      .arrow-clean-label { fill: #d4a857; font: 600 11px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; letter-spacing: 0.06em; }
    </style>
    <marker id="arrow-fuzzy-head" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#6e7681"/>
    </marker>
    <marker id="arrow-clean-head" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#d4a857"/>
    </marker>
  </defs>

  <rect class="bg" width="1280" height="600"/>

  <text x="640" y="44" text-anchor="middle" class="title">THE PROBLEM, AND WHAT THE CONTRACT FIXES</text>
  <text x="640" y="68" text-anchor="middle" class="subtitle">prose alone vs prose with a declared boundary</text>

  <g transform="translate(60,110)">
    <text x="0" y="0" class="col-title">A. SKILL.md ALONE</text>
    <text x="0" y="22" class="muted">implicit boundary, the caller has to read every file</text>

    <g transform="translate(0,46)">
      <path d="M10,40 L60,40 L82,20 L530,20 L530,300 L10,300 Z" class="panel-loose" stroke-linejoin="round"/>
      <text x="100" y="50" class="tag">SKILL FOLDER · FUZZY BOUNDARY</text>

      <g transform="translate(40,80)">
        <rect class="panel" width="450" height="200" rx="6"/>
        <text x="18" y="28" class="label-dim">SKILL.md</text>
        <text x="18" y="56" class="muted">## Operations</text>
        <text x="18" y="76" class="muted">render, transform, validate? maybe save?</text>
        <text x="18" y="104" class="muted">## Usage</text>
        <text x="18" y="124" class="muted">prose example, parameters inferred</text>
        <text x="18" y="152" class="red">? what does it accept ·  ? what does it return</text>
        <text x="18" y="174" class="red">? what side effects ·  ? what invariants</text>
      </g>
    </g>

    <g transform="translate(0,440)">
      <rect class="panel" width="540" height="80" rx="8"/>
      <text x="18" y="28" class="tag">CALLER</text>
      <text x="18" y="52" class="label">must read every file to depend on it</text>
      <text x="18" y="70" class="muted">no enforceable boundary, no typed contract</text>
    </g>

    <text x="270" y="420" text-anchor="middle" class="arrow-fuzzy-label">"is anything safe to depend on?"</text>
    <path d="M270,440 L270,386" fill="none" stroke="#6e7681" stroke-width="1.5"
          stroke-dasharray="4 4" marker-end="url(#arrow-fuzzy-head)">
      <animate attributeName="stroke-dashoffset" from="0" to="-8" dur="1.2s" repeatCount="indefinite"/>
    </path>
  </g>

  <line x1="640" y1="110" x2="640" y2="540" stroke="#30363d" stroke-width="1" stroke-dasharray="2 4"/>

  <g transform="translate(680,110)">
    <text x="0" y="0" class="col-title-gold">B. SKILL.md + COVENANT.md</text>
    <text x="0" y="22" class="muted">declared boundary, typed, validatable, signable</text>

    <g transform="translate(0,46)">
      <path d="M10,40 L60,40 L82,20 L530,20 L530,300 L10,300 Z" class="panel-bound" stroke-linejoin="round"/>
      <text x="100" y="50" class="tag" fill="#d4a857">SKILL FOLDER · BOUND</text>

      <g transform="translate(40,80)">
        <rect class="panel" width="210" height="200" rx="6" opacity="0.6"/>
        <text x="14" y="26" class="label-dim">SKILL.md</text>
        <text x="14" y="50" class="muted">implementation</text>
        <text x="14" y="68" class="muted">steps · scripts</text>
        <text x="14" y="86" class="muted">internal</text>
        <text x="14" y="120" class="muted" font-style="italic">"how to do it"</text>
        <text x="14" y="170" class="tag">PRIVATE</text>
      </g>

      <g transform="translate(270,80)">
        <rect class="panel-bound" width="220" height="200" rx="6">
          <animate attributeName="stroke-opacity" values="0.7;1;0.7" dur="2.8s" repeatCount="indefinite"/>
        </rect>
        <text x="14" y="26" class="label-gold">COVENANT.md</text>
        <text x="14" y="52" class="field">domain</text>
        <text x="14" y="72" class="field">interface</text>
        <text x="14" y="92" class="field">dependencies</text>
        <text x="14" y="112" class="field">contracts</text>
        <text x="14" y="132" class="field">quality</text>
        <line x1="14" y1="148" x2="206" y2="148" stroke="#d4a857" stroke-width="1" opacity="0.5"/>
        <text x="14" y="172" class="green">typed · validatable · proved</text>
      </g>
    </g>

    <g transform="translate(0,440)">
      <rect class="panel" width="540" height="80" rx="8"/>
      <text x="18" y="28" class="tag" fill="#d4a857">CALLER</text>
      <text x="18" y="52" class="label">depends on the covenant, not the folder</text>
      <text x="18" y="70" class="muted">declared boundary, contracts enforceable in CI</text>
    </g>

    <text x="380" y="420" text-anchor="middle" class="arrow-clean-label">reads the covenant, signs the contract</text>
    <path d="M380,440 L380,386" fill="none" stroke="#d4a857" stroke-width="2"
          stroke-dasharray="5 5" marker-end="url(#arrow-clean-head)">
      <animate attributeName="stroke-dashoffset" from="0" to="-10" dur="0.9s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
