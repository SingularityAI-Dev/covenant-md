<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 620" width="1280" height="620" role="img" aria-label="COVENANT.md is the design-contract layer beside SKILL.md inside an agent skill folder. The caller depends on the declared boundary, not on the skill's internals. Five sections: domain, interface, dependencies, contracts, quality.">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .panel { fill: #161b22; stroke: #30363d; stroke-width: 1.5; }
      .panel-core { fill: #161b22; stroke: #d4a857; stroke-width: 2; }
      .folder { fill: #161b22; stroke: #30363d; stroke-width: 1.5; }
      .title { fill: #c9d1d9; font: 600 20px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; letter-spacing: 0.04em; }
      .subtitle { fill: #8b949e; font: 400 13px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
      .label { fill: #c9d1d9; font: 700 16px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; letter-spacing: 0.03em; }
      .label-gold { fill: #d4a857; font: 700 22px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; letter-spacing: 0.04em; }
      .label-dim { fill: #6e7681; font: 700 16px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; letter-spacing: 0.03em; }
      .tag { fill: #8b949e; font: 600 11px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; letter-spacing: 0.14em; }
      .muted { fill: #8b949e; font: 400 12px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
      .arrow-label { fill: #d4a857; font: 600 12px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; letter-spacing: 0.06em; }
      .pill { fill: #1f2530; stroke: #d4a857; stroke-width: 1.4; }
      .pill-text { fill: #d4a857; font: 700 13px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; letter-spacing: 0.10em; }
      .caption { fill: #8b949e; font: 400 12px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; }
    </style>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4a857" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#d4a857" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#d4a857" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#d4a857"/>
    </marker>
  </defs>

  <rect class="bg" width="1280" height="620"/>

  <text x="640" y="44" text-anchor="middle" class="title">COVENANT.md · THE CONTRACT LAYER FOR AGENT SKILLS</text>
  <text x="640" y="68" text-anchor="middle" class="subtitle">declared · validatable · framework-agnostic</text>

  <g transform="translate(60,180)">
    <rect class="panel" width="300" height="100" rx="10"/>
    <text x="20" y="28" class="tag">CALLER</text>
    <text x="20" y="60" class="label">CLAUDE.md / agent</text>
    <text x="20" y="82" class="muted">depends on the boundary</text>
  </g>

  <g transform="translate(460,150)">
    <ellipse cx="380" cy="200" rx="380" ry="190" fill="url(#glow)">
      <animate attributeName="opacity" values="0.45;0.95;0.45" dur="3.6s" repeatCount="indefinite"/>
    </ellipse>

    <path d="M0,50 L46,50 L68,30 L760,30 L760,400 L0,400 Z" class="folder" stroke-linejoin="round"/>
    <text x="86" y="60" class="tag">SKILL FOLDER</text>

    <g transform="translate(40,90)">
      <rect class="panel" width="320" height="280" rx="8"/>
      <text x="18" y="28" class="tag">IMPLEMENTATION · PRIVATE</text>
      <text x="18" y="68" class="label-dim">SKILL.md</text>
      <text x="18" y="94" class="muted">the procedural how</text>
      <text x="18" y="116" class="muted">steps · scripts · prose</text>
      <text x="18" y="138" class="muted">internals subject to change</text>
      <line x1="18" y1="160" x2="302" y2="160" stroke="#30363d" stroke-width="1"/>
      <text x="18" y="184" class="muted" font-style="italic">"how to do it"</text>
      <text x="18" y="232" class="tag">internals stay private</text>
    </g>

    <g transform="translate(400,90)">
      <rect class="panel-core" width="320" height="280" rx="8"/>
      <text x="18" y="28" class="tag" fill="#d4a857">CONTRACT · PUBLIC</text>
      <text x="18" y="62" class="label-gold">COVENANT.md</text>
      <text x="18" y="94" class="muted">domain · interface</text>
      <text x="18" y="116" class="muted">dependencies · contracts</text>
      <text x="18" y="138" class="muted">quality fixtures</text>
      <line x1="18" y1="160" x2="302" y2="160" stroke="#d4a857" stroke-width="1" opacity="0.6"/>
      <text x="18" y="184" class="muted" font-style="italic">"what it promises"</text>
      <text x="18" y="232" class="tag" fill="#d4a857">declared · typed · validatable</text>
    </g>
  </g>

  <text x="700" y="125" text-anchor="middle" class="arrow-label">reads the boundary, not the internals</text>
  <path d="M360,210 Q 540,150 720,210 T 980,235" fill="none" stroke="#d4a857" stroke-width="2"
        stroke-dasharray="6 6" marker-end="url(#arrowhead)">
    <animate attributeName="stroke-dashoffset" from="0" to="-12" dur="0.9s" repeatCount="indefinite"/>
  </path>

  <g transform="translate(80,500)">
    <text x="0" y="0" class="tag">THE FIVE QUESTIONS · EVERY COVENANT ANSWERS</text>
    <g transform="translate(0,20)">
      <rect class="pill" x="0" y="0" width="220" height="42" rx="21"/>
      <text x="110" y="27" text-anchor="middle" class="pill-text">DOMAIN</text>
    </g>
    <g transform="translate(240,20)">
      <rect class="pill" x="0" y="0" width="220" height="42" rx="21"/>
      <text x="110" y="27" text-anchor="middle" class="pill-text">INTERFACE</text>
    </g>
    <g transform="translate(480,20)">
      <rect class="pill" x="0" y="0" width="220" height="42" rx="21"/>
      <text x="110" y="27" text-anchor="middle" class="pill-text">DEPENDENCIES</text>
    </g>
    <g transform="translate(720,20)">
      <rect class="pill" x="0" y="0" width="220" height="42" rx="21"/>
      <text x="110" y="27" text-anchor="middle" class="pill-text">CONTRACTS</text>
    </g>
    <g transform="translate(960,20)">
      <rect class="pill" x="0" y="0" width="220" height="42" rx="21"/>
      <text x="110" y="27" text-anchor="middle" class="pill-text">QUALITY</text>
    </g>
    <text x="600" y="84" text-anchor="middle" class="caption">who are you · what do you expose · what do you need · what do you promise · how do you prove it</text>
  </g>
</svg>
